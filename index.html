<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="reset.css" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <title>Video Sequencer</title>
  </head>

  <body>
    <main id="app">
      <header>
        <p class="strobe-title" aria-label="strobo">
          <span>s</span><span>s</span><span>s</span><span>t</span><span>t</span
          ><span>t</span><span>r</span><span>r</span><span>r</span><span>o</span
          ><span>o</span><span>o</span><span>b</span><span>b</span><span>b</span
          ><span>o</span><span>o</span><span>o</span>
        </p>
        <p>A digital tool for those who like sequences</p>
      </header>

      <label class="file-field">
        <span>Load a fixed-camera video</span>
        <input
          id="fileInput"
          name="video"
          type="file"
          accept="video/mp4,video/x-m4v,video/*"
        />
      </label>

      <section id="video-panel">
        <h2>Source</h2>
        <video
          muted
          controls
          playsinline
          webkit-playsinline
          id="videoPlayer"
          crossorigin="anonymous"
        >
          <source src="video_adxnap.mov" />
        </video>
        <button id="play" type="button">Play</button>
      </section>

      <section id="controls">
        <h2>Controls</h2>

        <div class="control">
          <label for="interval">Interval</label>
          <input id="interval" type="range" min="40" max="500" step="10" value="100" />
          <span id="interval-value" class="value"></span>
        </div>

        <div class="control">
          <label for="threshold">Threshold</label>
          <input id="threshold" type="range" min="5" max="120" step="1" value="30" />
          <span id="threshold-value" class="value"></span>
        </div>

        <div class="control">
          <label for="highlight">Highlight subject</label>
          <input id="highlight" type="checkbox" />
          <input id="color" type="color" value="#ff0000" />
        </div>

        <div class="control buttons">
          <button id="reset" type="button">reset</button>
          <button id="save" type="button">save picture</button>
          <span id="progress" class="value"></span>
        </div>
      </section>

      <section id="result">
        <h2>Result</h2>
        <canvas id="output" width="960" height="540"></canvas>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
